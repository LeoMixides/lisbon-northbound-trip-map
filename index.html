<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lisbon Northbound Backpacking Routes</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='7' fill='%230d7180'/%3E%3Cpath d='M3 10c2-3 7-3 10 0' fill='none' stroke='%23fffdf8' stroke-width='2'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="map-area" aria-label="Route map">
        <div id="map" class="map"></div>
        <div class="map-title">
          <p class="eyebrow">1-15 August 2026</p>
          <h1>Lisbon northbound</h1>
        </div>
        <div class="map-toolbar">
          <button id="fitRoute" class="tool-button" type="button">Full route</button>
          <div id="categoryFilters" class="category-filters" aria-label="Map place filters"></div>
        </div>
      </section>

      <aside class="panel" aria-label="Trip planner">
        <header class="panel-head">
          <p class="eyebrow">Choose the route</p>
          <h2>Three realistic ways to do Lisbon to the north.</h2>
          <div id="routeChoices" class="route-choices"></div>
        </header>

        <section class="route-card">
          <div class="route-card-top">
            <div>
              <p id="routeMeta" class="eyebrow"></p>
              <h3 id="routeName"></h3>
            </div>
            <span id="routeBadge" class="badge"></span>
          </div>
          <p id="routeWhy" class="route-copy"></p>
          <div id="itinerary" class="itinerary"></div>
        </section>

        <section class="city-card">
          <div class="city-head">
            <div>
              <p id="cityDates" class="eyebrow"></p>
              <h3 id="cityName"></h3>
            </div>
            <a id="cityMaps" class="maps-link" target="_blank" rel="noreferrer">Google Maps</a>
          </div>
          <p id="citySummary" class="route-copy"></p>
          <div class="city-basics">
            <div>
              <strong>Best area</strong>
              <p id="cityArea"></p>
            </div>
            <div>
              <strong>Booking note</strong>
              <p id="cityBooking"></p>
            </div>
          </div>
          <div id="stayPlanner" class="stay-planner"></div>
          <div id="citySections" class="city-sections"></div>
        </section>

        <section class="transport-card">
          <div class="section-head">
            <p class="eyebrow">Transport for selected route</p>
            <h3>Best options by leg</h3>
          </div>
          <div id="transportList" class="transport-list"></div>
        </section>

        <section class="sources-card">
          <details>
            <summary>Research sources</summary>
            <ul id="sourceList"></ul>
          </details>
        </section>
      </aside>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
